# Netlify config for narrativestack.ai
# Static site, no build step. Publish this folder as-is.

# Serverless functions (Quick-Check → Kit handoff). The KIT_API_KEY
# environment variable must be set in Netlify for the function to work.
[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/field-guide"
  to = "/field-guide.html"
  status = 200

[[redirects]]
  from = "/quick-check"
  to = "/quick-check.html"
  status = 200

[[redirects]]
  from = "/proximity-read"
  to = "/proximity-read.html"
  status = 200

# Engagement path subpages: pretty URLs (/paths/narrative-sprint -> .html)
[[redirects]]
  from = "/paths/:slug"
  to = "/paths/:slug.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Keep the engagement path subpages out of search while unlisted
[[headers]]
  for = "/paths/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
